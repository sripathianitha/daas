<!DOCTYPE html>
{% load static %}
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="shortcut icon" href="{% static 'images/favicon.ico' %}">
    <title>DAAS</title>
    <link rel="stylesheet" href="{% static 'css/bootstrap.min.css' %}">
    <link rel="stylesheet" href="{% static 'css/bootstrap-grid.min.css' %}">
    <link rel="stylesheet" href="{% static 'css/select2.css' %}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans&display=swap" rel="stylesheet">
<!--    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">-->
    <link rel="stylesheet" href="{% static 'css/fontawesome-free-6.6.0-web/css/fontawesome.min.css' %}">
    <link rel="stylesheet" href="{% static 'css/fontawesome-free-6.6.0-web/css/brands.min.css' %}">
    <link rel="stylesheet" href="{% static 'css/fontawesome-free-6.6.0-web/css/solid.min.css' %}">
    <link rel="stylesheet" href="{% static 'css/fontawesome-free-6.6.0-web/css/regular.min.css' %}">
    <link rel="stylesheet" href="{% static 'css/custom_style_v2.css' %}">
</head>
<body id="daas_body">
    <nav id="custom_navbar" class="navbar" aria-label="DAAS navbar">
        <div class="container-fluid">
            <div class="navbar-brand">
                <img id="custom_navbar_logo_img" src="{% static 'images/cohesity-logo-white2.svg' %}" alt="DAAS">
            </div>
            <a class="navbar-brand" href="/">
                <img id="custom_navbar_bell_img" src="{% static 'images/iconamoon_home.svg' %}" alt="HOME">
            </a>
        </div>
    </nav>
    {% block content %}
    {% endblock %}
    <div id="homesnackbarError">
        <div class="row">
            <div class="col-md-2"><i class="fa-solid fa-circle-exclamation"></i></div>
            <div class="col-md-10 padding_0_px" id="homesnackbarErrorMsg"></div>
        </div>
    </div>
    <div id="homesnackbarWarning">
        <div class="row">
            <div class="col-md-2"><i class="fa-solid fa-triangle-exclamation"></i></div>
            <div class="col-md-10" id="homesnackbarWarningMsg"></div>
        </div>
    </div>
    <div id="homesnackbarSuccess">
        <div class="row">
            <div class="col-md-2"><i class="fa-solid fa-circle-check"></i></div>
            <div class="col-md-10" id="homesnackbarSuccessMsg"></div>
        </div>
    </div>
    <script src="{% static 'js/jquery-3.7.1.min.js' %}"></script>
    <script src="{% static 'js/bootstrap.js' %}"></script>
    <script src="{% static 'js/select2.js' %}"></script>
    <script src="{% static 'js/custom_js_v2.js' %}"></script>
</body>
</html>
