<!DOCTYPE html>
{% load static %}
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="shortcut icon" href="{% static 'images/favicon.ico' %}">
    <title>DAAS</title>
    <link rel="stylesheet" href="{% static 'css/bootstrap.min.css' %}">
    <link rel="stylesheet" href="{% static 'css/bootstrap-grid.min.css' %}">
    <link rel="stylesheet" href="{% static 'css/select2.css' %}">
    <link rel="stylesheet" href="{% static 'css/custom_style.css' %}">
</head>
<body id="daas_body">
    <nav id="custom_navbar" class="navbar navbar-expand navbar-dark bg-dark" aria-label="DAAS navbar">
        <div class="container-fluid">
            <div class="navbar-brand">
                {% if request.path == '/' %}
                <span id="side_menu_open_button" class="menu_open_btn" data-navstatus="close">☰</span>
                {% endif %}
                <img id="custom_navbar_logo_img" src="{% static 'images/cohesity-logo-white.svg' %}" alt="DAAS">
            </div>
            <a class="navbar-brand" href="/">DAAS (Debug & Analysis As A Service)</a>
        </div>
    </nav>
    {% block content %}
    {% endblock %}
    <div id="homesnackbarError"></div>
    <div id="homesnackbarWarning"></div>
    <div id="homesnackbarSuccess"></div>
    <script src="{% static 'js/jquery-3.7.1.min.js' %}"></script>
    <script src="{% static 'js/bootstrap.js' %}"></script>
    <script src="{% static 'js/select2.js' %}"></script>
    <script src="{% static 'js/custom_js.js' %}"></script>

</body>
</html>
